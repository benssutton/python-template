name: python-template

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-appdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./scripts/clickhouse-init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./tests/performance/data/clickhouse-seed.sh:/docker-entrypoint-initdb.d/02-seed.sh
      - ./tests/test_data/clickhouse_seed_data.ipc:/tmp/clickhouse_seed_data.ipc
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  solace:
    profiles: [solace]
    image: solace/solace-pubsub-standard:latest
    ports:
      - "55555:55555"
      - "8080:8080"
    environment:
      username_admin_globalaccesslevel: admin
      username_admin_password: admin
      # Minimum scaling tier (~1 GiB) so the broker fits a dev-sized Docker VM.
      system_scaling_maxconnectioncount: "100"
    # Solace POST hard requirement: nofile hard limit >= 1048576 (older
    # 2448:6592 values trigger a startup ERROR and immediate shutdown).
    shm_size: "1g"
    ulimits:
      core: -1
      nofile:
        soft: 1048576
        hard: 1048576
    # Readiness gate: the guaranteed-messaging health-check port returns 200
    # once the broker is active. (SEMP on 8080 returns 401 without auth, so it
    # is not a usable unauthenticated health probe.)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5550/health-check/guaranteed-active || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  solace-publisher:
    profiles: [solace]
    build: .
    command: ["python", "tests/performance/publishers/solace_publisher.py"]
    environment:
      SOLACE_HOST: solace
      SOLACE_PORT: "55555"
      SOLACE_VPN: default
      SOLACE_USERNAME: admin
      SOLACE_PASSWORD: admin
      SOLACE_TOPIC: "ingest/batches"
      PUBLISH_INTERVAL: "0.1"
    depends_on:
      solace:
        condition: service_healthy

  flight:
    build: .
    command: ["python", "tests/publishers/flight_server.py"]
    environment:
      FLIGHT_BIND_HOST: 0.0.0.0
      FLIGHT_PORT: "8815"
      FLIGHT_INTERVAL: "0.2"
    ports:
      - "8815:8815"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import pyarrow.flight as fl; fl.connect('grpc://localhost:8815').wait_for_available(timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-appdb}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      REDIS_URL: redis://redis:6379/0
      FLIGHT_HOST: flight
      FLIGHT_PORT: "8815"
      INGEST_TRANSPORT: ${INGEST_TRANSPORT:-flight}
      SOLACE_HOST: solace
      SOLACE_PORT: "55555"
      SOLACE_VPN: default
      SOLACE_USERNAME: admin
      SOLACE_PASSWORD: admin
      SOLACE_TOPIC: "ingest/batches"
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Transport services are not listed here — the ingest layer retries
      # the transport connection so Compose does not gate app startup on them.
      # Default (Flight):  docker compose up
      # Solace mode:       docker compose --profile solace up
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  prometheus:
    profiles: [observability]
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      app:
        condition: service_healthy

  grafana:
    profiles: [observability]
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
